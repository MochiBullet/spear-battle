<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spear Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background:#0a0a0a; color:#e6fffa; font-family:system-ui,sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100dvh; overflow:hidden; touch-action:none; }
canvas { display:block; width:100%; max-width:800px; background:#0a0a0a; }
.overlay { position:fixed; top:0;left:0;right:0;bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); z-index:10; }
.overlay.hidden { display:none; }
h1 { font-size:2rem; color:#2dd4bf; margin-bottom:1rem; }
.subtitle { font-size:0.9rem; color:#8ba8a3; margin-bottom:2rem; }
.btn { display:block; width:220px; padding:14px; margin:8px auto; border:2px solid #2dd4bf; background:transparent; color:#2dd4bf; font-size:1rem; font-weight:bold; border-radius:12px; cursor:pointer; transition:all 0.2s; }
.btn:active,.btn:hover { background:#2dd4bf; color:#0a0a0a; }
.btn-secondary { border-color:#f472b6; color:#f472b6; }
.btn-secondary:active,.btn-secondary:hover { background:#f472b6; color:#0a0a0a; }
.btn-small { width:auto; padding:10px 18px; font-size:0.85rem; display:inline-block; }
#controls { position:fixed; bottom:0; left:0;right:0; background:#111; border-top:1px solid #173832; padding:12px 16px; padding-bottom:max(12px,env(safe-area-inset-bottom)); display:flex; gap:12px; align-items:center; justify-content:center; z-index:5; }
#controls.hidden { display:none; }
.ctrl-label { font-size:12px; color:#8ba8a3; text-align:center; }
.ctrl-value { font-size:18px; font-weight:bold; color:#2dd4bf; text-align:center; }
input[type="range"] { width:100px; accent-color:#2dd4bf; }
.fire-btn { padding:12px 28px; background:#2dd4bf; color:#0a0a0a; border:none; border-radius:10px; font-size:1rem; font-weight:bold; cursor:pointer; }
.fire-btn:active { background:#5eead4; } .fire-btn:disabled { opacity:0.4; cursor:not-allowed; }
#turnInfo { position:fixed; top:10px; left:50%; transform:translateX(-50%); font-size:14px; font-weight:bold; color:#2dd4bf; background:rgba(0,0,0,0.7); padding:6px 16px; border-radius:20px; z-index:5; }
#turnInfo.hidden { display:none; }
#windInfo { position:fixed; top:38px; left:50%; transform:translateX(-50%); font-size:12px; color:#8ba8a3; background:rgba(0,0,0,0.7); padding:4px 14px; border-radius:16px; z-index:5; }
#windInfo.hidden { display:none; }
#result h2 { font-size:2.5rem; color:#2dd4bf; }
#result p { font-size:1.2rem; color:#8ba8a3; margin-top:0.5rem; }
.room-code { font-size:2.5rem; font-weight:bold; color:#ffd700; letter-spacing:8px; background:#1a2e2a; padding:12px 28px; border-radius:12px; margin:1rem 0; }
.room-input { font-size:1.5rem; text-align:center; letter-spacing:6px; width:200px; padding:12px; background:#1a2e2a; border:2px solid #173832; border-radius:12px; color:#e6fffa; margin:1rem 0; text-transform:uppercase; }
.room-input:focus { border-color:#2dd4bf; outline:none; }
.wait-text { color:#8ba8a3; font-size:0.9rem; animation:pulse 1.5s infinite; }
select { padding:10px; background:#1a2e2a; border:2px solid #173832; border-radius:8px; color:#e6fffa; font-size:1rem; margin:4px; }
select:focus { border-color:#2dd4bf; outline:none; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
@keyframes floatUp { 0%{transform:translateY(0);opacity:1;} 100%{transform:translateY(-40px);opacity:0;} }
@keyframes lightningFlash { 0%{opacity:0.8;} 15%{opacity:0.2;} 30%{opacity:0.7;} 50%{opacity:0.1;} 100%{opacity:0;} }
</style>
</head>
<body>

<div id="turnInfo" class="hidden"></div>
<div id="windInfo" class="hidden"></div>
<canvas id="game"></canvas>

<div id="controls" class="hidden">
  <div>
    <div class="ctrl-label">角度</div>
    <div class="ctrl-value" id="angleVal">45°</div>
    <input type="range" id="angleSlider" min="5" max="85" value="45">
  </div>
  <div style="flex:1;max-width:160px">
    <div class="ctrl-label">パワー</div>
    <div style="position:relative;height:20px;background:#1a2e2a;border-radius:10px;overflow:hidden;margin-top:4px">
      <div id="powerBar" style="position:absolute;left:0;top:0;height:100%;width:50%;background:#2dd4bf;border-radius:10px;transition:none"></div>
    </div>
    <div class="ctrl-value" id="powerVal" style="margin-top:2px">50</div>
  </div>
  <button class="fire-btn" id="fireBtn">投げる!</button>
</div>

<!-- Menu -->
<div id="ui" class="overlay">
  <h1>🔱 Spear Battle</h1>
  <p class="subtitle">棒人間 槍投げ対戦</p>
  <div style="margin-bottom:8px">
    <label class="ctrl-label">プレイヤー数</label>
    <select id="playerCount"><option value="2">2人</option><option value="3">3人</option><option value="4">4人</option><option value="5">5人</option><option value="6">6人</option></select>
  </div>
  <button class="btn" id="startBtn">ローカル対戦</button>
  <button class="btn" id="cpuBtn">CPU対戦</button>
  <button class="btn btn-secondary" id="createRoomBtn">部屋を作る</button>
  <button class="btn btn-secondary" id="joinRoomBtn">部屋に入る</button>
</div>

<!-- CPU setup -->
<div id="cpuSetup" class="overlay hidden">
  <h1>🤖 CPU対戦</h1>
  <p class="subtitle">CPUの強さは毎ターンランダム</p>
  <div style="margin-bottom:12px">
    <label class="ctrl-label">CPU人数</label>
    <select id="cpuCount"><option value="1">1体</option><option value="2">2体</option><option value="3">3体</option><option value="4">4体</option><option value="5">5体</option></select>
  </div>
  <button class="btn" id="cpuStartBtn">開始</button>
  <button class="btn" id="cpuBackBtn">戻る</button>
</div>

<!-- Wait room -->
<div id="waitRoom" class="overlay hidden">
  <h1>🔱 部屋を作成</h1>
  <p class="subtitle">この合言葉を相手に伝えてください</p>
  <div class="room-code" id="roomCodeDisplay">----</div>
  <p class="wait-text" id="waitText">相手を待っています...</p>
  <button class="btn" id="cancelRoomBtn" style="margin-top:1rem">キャンセル</button>
</div>

<!-- Join room -->
<div id="joinRoom" class="overlay hidden">
  <h1>🔱 部屋に入る</h1>
  <p class="subtitle">合言葉を入力</p>
  <input type="text" class="room-input" id="roomCodeInput" maxlength="4" placeholder="ABCD">
  <button class="btn btn-secondary" id="joinConfirmBtn">参加する</button>
  <p id="joinError" style="color:#f44;font-size:0.85rem;margin-top:0.5rem"></p>
  <button class="btn" id="cancelJoinBtn" style="margin-top:0.5rem">戻る</button>
</div>

<!-- Result -->
<div id="result" class="overlay hidden">
  <h2 id="winnerText"></h2>
  <p id="winnerSub"></p>
  <button class="btn" style="margin-top:2rem" id="retryBtn">もう一度</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyA8l-oe2BqZihiVVtizEl1fMGqhy8W-JzA",authDomain:"spear-battle.firebaseapp.com",
  databaseURL:"https://spear-battle-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"spear-battle",storageBucket:"spear-battle.firebasestorage.app",
  messagingSenderId:"696563248470",appId:"1:696563248470:web:158790c082a6cf408dbaf7"
});
const db = firebase.database();

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  const w = Math.min(window.innerWidth, 800), h = Math.min(window.innerHeight*0.7, 450);
  canvas.width=w*2; canvas.height=h*2; canvas.style.height=h+'px'; ctx.scale(2,2); W=w; H=h;
}
resize(); window.addEventListener('resize', resize);

const GRAVITY = 0.3, GROUND_Y_RATIO = 0.78;
const PLAYER_COLORS = ['#2dd4bf','#f472b6','#fbbf24','#818cf8','#fb923c','#a3e635'];
const PLAYER_NAMES = ['P1','P2','P3','P4','P5','P6'];

let players, currentPlayer, spear, gameRunning, animating, terrain;
let wind = 0;
let onlineMode = false, cpuMode = false, myPlayer = -1, roomRef = null, roomCode = null;
let cpuPlayers = new Set();
let kills = {};

// Sound effects
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playTone(freq, dur, type, vol) {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  g.gain.value = vol || 0.15;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxThrow() { playTone(200, 0.15, 'sawtooth', 0.12); setTimeout(() => playTone(350, 0.1, 'sawtooth', 0.08), 50); }
function sfxHit() { playTone(100, 0.3, 'square', 0.2); setTimeout(() => playTone(80, 0.2, 'square', 0.15), 100); }
function sfxKill() { playTone(60, 0.5, 'sawtooth', 0.25); setTimeout(() => playTone(40, 0.4, 'square', 0.2), 150); }
function sfxMiss() { playTone(300, 0.15, 'sine', 0.08); }
function sfxWin() { [0,100,200,300].forEach((d,i) => setTimeout(() => playTone(400+i*100, 0.2, 'square', 0.12), d)); }
function sfxThunder() { playTone(50,0.6,'sawtooth',0.3); setTimeout(()=>playTone(30,0.8,'square',0.25),100); setTimeout(()=>playTone(70,0.4,'sawtooth',0.2),300); }

// Idle timer - lightning strike after 20s
let idleTimer = null;
function resetIdleTimer() {
  clearTimeout(idleTimer);
  if (!gameRunning || animating) return;
  idleTimer = setTimeout(strikeWithLightning, 20000);
}

function strikeWithLightning() {
  if (!gameRunning || animating) return;
  const p = players[currentPlayer];
  if (!p.alive) return;

  stopPowerGauge();
  sfxThunder();

  // Flash effect
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:white;z-index:50;pointer-events:none;animation:lightningFlash 0.6s ease-out forwards;';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 600);

  showDamage(p.x, p.y - H*0.035*5, '⚡');
  showDamage(p.x, p.y - H*0.035*3, 'TIME OUT');

  p.hp = 0;
  p.alive = false;

  const alive = alivePlayers();
  if (alive.length <= 1) {
    gameRunning = false;
    setTimeout(() => showResult(alive[0] || null), 1000);
  } else {
    setTimeout(nextTurn, 1200);
  }
  draw();
}

function groundY() { return H * GROUND_Y_RATIO; }

const TERRAINS = [
  { name:'フラット', gen:()=>[] },
  { name:'丘', gen:()=>[{x:0.5,w:0.3,h:0.12}] },
  { name:'谷', gen:()=>[{x:0.3,w:0.15,h:0.1},{x:0.7,w:0.15,h:0.1}] },
  { name:'壁', gen:()=>[{x:0.5,w:0.04,h:0.25}] },
  { name:'階段', gen:()=>[{x:0.3,w:0.12,h:0.06},{x:0.5,w:0.12,h:0.12},{x:0.7,w:0.12,h:0.18}] },
  { name:'双丘', gen:()=>[{x:0.35,w:0.15,h:0.1},{x:0.65,w:0.15,h:0.1}] },
  { name:'要塞', gen:()=>[{x:0.5,w:0.2,h:0.18},{x:0.5,w:0.06,h:0.3}] },
  { name:'でこぼこ', gen:()=>[{x:0.25,w:0.08,h:0.06},{x:0.45,w:0.06,h:0.1},{x:0.6,w:0.1,h:0.04},{x:0.8,w:0.05,h:0.08}] },
  { name:'高台', gen:()=>[{x:0.15,w:0.12,h:0.15},{x:0.85,w:0.12,h:0.08}] },
  { name:'カオス', gen:()=>Array.from({length:3+Math.floor(Math.random()*4)},()=>({x:0.2+Math.random()*0.6,w:0.04+Math.random()*0.12,h:0.04+Math.random()*0.2})) },
];

function randomWind() { wind = (Math.random()-0.5)*0.12; }

function initGame(numPlayers, terrainData) {
  const n = numPlayers || 2;
  if (terrainData) terrain = terrainData;
  else { const t = TERRAINS[Math.floor(Math.random()*TERRAINS.length)]; terrain = {name:t.name,blocks:t.gen()}; }

  const positions = [];
  for (let i = 0; i < n; i++) positions.push(0.1 + (0.8/(n-1||1)) * i);

  players = positions.map((xr, i) => ({
    x: W*xr, y: getPlayerGroundRaw(xr), hp: 100, maxHp: 100,
    color: PLAYER_COLORS[i], name: PLAYER_NAMES[i], dir: xr < 0.5 ? 1 : -1, alive: true
  }));
  currentPlayer = 0; spear = null; gameRunning = true; animating = false;
  kills = {}; players.forEach((_, i) => kills[i] = 0);
  randomWind();
}

function getPlayerGroundRaw(xRatio) {
  const gy = groundY(), px = W * xRatio;
  for (const b of (terrain ? terrain.blocks : [])) {
    const bx=W*b.x, bw=W*b.w, bh=H*b.h;
    if (px > bx-bw/2 && px < bx+bw/2) return gy-bh;
  }
  return gy;
}

function terrainHit(sx, sy) {
  if (sy >= groundY()) return true;
  for (const b of terrain.blocks) {
    const bx=W*b.x, bw=W*b.w, bh=H*b.h;
    if (sx>bx-bw/2 && sx<bx+bw/2 && sy>groundY()-bh) return true;
  }
  return false;
}

function alivePlayers() { return players.filter(p => p.alive); }

// Drawing
function drawStickman(p) {
  if (!p.alive) return;
  const x=p.x, y=p.y, s=Math.min(W,H)*0.035;
  ctx.strokeStyle=p.color; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(x,y-s*3.5,s*0.7,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y-s*2.8); ctx.lineTo(x,y-s*0.8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s*0.8,y-s*2.2); ctx.lineTo(x,y-s*2); ctx.lineTo(x+s*0.8,y-s*2.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y-s*0.8); ctx.lineTo(x-s*0.6,y); ctx.moveTo(x,y-s*0.8); ctx.lineTo(x+s*0.6,y); ctx.stroke();
  const barW=s*3,barH=3,barX=x-barW/2,barY=y-s*5;
  ctx.fillStyle='#333'; ctx.fillRect(barX,barY,barW,barH);
  ctx.fillStyle=p.hp>30?p.color:'#f44'; ctx.fillRect(barX,barY,barW*(p.hp/p.maxHp),barH);
  ctx.fillStyle=p.color; ctx.font=`bold ${Math.max(9,s*0.55)}px system-ui`; ctx.textAlign='center';
  ctx.fillText(p.name,x,barY-3);
}

function drawSpear(s) {
  if (!s) return;
  const angle=Math.atan2(s.vy,s.vx), len=16;
  ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(angle);
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(-len,0); ctx.lineTo(len,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(len,0); ctx.lineTo(len-5,-4); ctx.moveTo(len,0); ctx.lineTo(len-5,4); ctx.stroke();
  ctx.restore();
}

function drawGround() {
  const gy=groundY();
  ctx.fillStyle='#1a2e2a'; ctx.fillRect(0,gy,W,H-gy);
  for (const b of terrain.blocks) {
    const bx=W*b.x,bw=W*b.w,bh=H*b.h;
    ctx.fillStyle='#243f3a'; ctx.fillRect(bx-bw/2,gy-bh,bw,bh);
    ctx.strokeStyle='#2dd4bf22'; ctx.lineWidth=1; ctx.strokeRect(bx-bw/2,gy-bh,bw,bh);
  }
  ctx.strokeStyle='#2dd4bf33'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
  ctx.fillStyle='#2dd4bf44'; ctx.font='11px system-ui'; ctx.textAlign='right';
  ctx.fillText(terrain.name,W-8,gy+14);
}

function drawWind() {
  const gy = groundY();
  const windStr = Math.abs(wind);
  const dir = wind > 0 ? '→' : wind < 0 ? '←' : '−';
  const arrows = windStr < 0.03 ? '無風' : dir.repeat(Math.min(Math.ceil(windStr*50), 5));
  document.getElementById('windInfo').textContent = `風: ${arrows}`;
}

function drawPreview() {
  if (animating || !gameRunning) return;
  const p = players[currentPlayer]; if (!p.alive) return;
  if (onlineMode && myPlayer !== currentPlayer) return;
  if (cpuMode && cpuPlayers.has(currentPlayer)) return;
  const angle=parseInt(angleSlider.value), rad=(angle*Math.PI)/180, dir=p.dir;
  const sx=p.x+dir*12, sy=p.y-H*0.035*2.2, al=35;
  const ex=sx+Math.cos(rad)*al*dir, ey=sy-Math.sin(rad)*al;
  ctx.strokeStyle='rgba(45,212,191,0.6)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
  const hl=7, ha=Math.atan2(sy-ey,sx-ex);
  ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(ex+Math.cos(ha+0.4)*hl,ey+Math.sin(ha+0.4)*hl);
  ctx.moveTo(ex,ey); ctx.lineTo(ex+Math.cos(ha-0.4)*hl,ey+Math.sin(ha-0.4)*hl); ctx.stroke();
}

function draw() {
  ctx.clearRect(0,0,W,H); drawGround(); players.forEach(drawStickman); drawSpear(spear);
  if (!animating) drawPreview(); drawWind();
}

// Spear
// result: { hitPlayer, dmg } from sender in online mode, null for local
function executeThrow(angle, power, cb, remoteResult) {
  animating=true; fireBtn.disabled=true; stopPowerGauge();
  clearTimeout(idleTimer);
  sfxThrow();
  const p=players[currentPlayer], rad=(angle*Math.PI)/180, dir=p.dir;
  spear={x:p.x+dir*12, y:p.y-H*0.035*2.2, vx:Math.cos(rad)*power*0.14*dir, vy:-Math.sin(rad)*power*0.14};
  let localHitDecided = false;

  function applyHit(hitIdx, dmg) {
    const opp=players[hitIdx];
    opp.hp=Math.max(0,opp.hp-dmg); spear=null;
    sfxHit();
    showDamage(opp.x,opp.y-H*0.035*4,dmg);
    if (opp.hp<=0) { opp.alive=false; kills[currentPlayer]=(kills[currentPlayer]||0)+1; sfxKill(); showDamage(opp.x,opp.y-H*0.035*5,'💀'); }
    const alive=alivePlayers();
    if (alive.length<=1) { gameRunning=false; setTimeout(()=>showResult(alive[0]||players[currentPlayer]),800); }
    else setTimeout(()=>{if(cb)cb();},1000);
    draw();
  }

  function applyMiss() {
    spear=null; sfxMiss(); showDamage(W/2,groundY()-30,'MISS');
    setTimeout(()=>{if(cb)cb();},800); draw();
  }

  function animate() {
    spear.vx += wind;
    spear.vx *= 0.998; spear.vy += GRAVITY; spear.x += spear.vx; spear.y += spear.vy;

    // Use remote result if available (online receiving side)
    if (remoteResult && !localHitDecided) {
      // Just animate until spear is near ground/target, then apply remote result
      const nearGround = spear.y > groundY() - 30;
      let nearTarget = false;
      if (remoteResult.hitPlayer >= 0) {
        const t = players[remoteResult.hitPlayer];
        const dx=spear.x-t.x, dy=spear.y-(t.y-H*0.035*2);
        nearTarget = Math.sqrt(dx*dx+dy*dy) < H*0.035*4;
      }
      if (nearTarget || nearGround || spear.x<-50 || spear.x>W+50) {
        localHitDecided = true;
        if (remoteResult.hitPlayer >= 0) applyHit(remoteResult.hitPlayer, remoteResult.dmg);
        else applyMiss();
        return;
      }
      draw(); requestAnimationFrame(animate); return;
    }

    // Local hit detection (local/CPU mode, or online sender)
    let hitPlayer = -1;
    for (let i=0; i<players.length; i++) {
      if (i===currentPlayer || !players[i].alive) continue;
      const dx=spear.x-players[i].x, dy=spear.y-(players[i].y-H*0.035*2);
      if (Math.sqrt(dx*dx+dy*dy) < H*0.035*2.5) { hitPlayer=i; break; }
    }

    if (hitPlayer >= 0) {
      const dmg=Math.floor(15+power*0.2+Math.random()*10);
      applyHit(hitPlayer, dmg);
      return;
    }
    if (terrainHit(spear.x,spear.y)||spear.x<-50||spear.x>W+50) {
      applyMiss(); return;
    }
    draw(); requestAnimationFrame(animate);
  }
  animate();

}

// Pre-calculate throw result without rendering (for online sync)
function simulateThrow(angle, power) {
  const p=players[currentPlayer], rad=(angle*Math.PI)/180, dir=p.dir;
  let sx=p.x+dir*12, sy=p.y-H*0.035*2.2;
  let svx=Math.cos(rad)*power*0.14*dir, svy=-Math.sin(rad)*power*0.14;
  for (let f=0; f<600; f++) {
    svx += wind; svx *= 0.998; svy += GRAVITY; sx += svx; sy += svy;
    for (let i=0; i<players.length; i++) {
      if (i===currentPlayer || !players[i].alive) continue;
      const dx=sx-players[i].x, dy=sy-(players[i].y-H*0.035*2);
      if (Math.sqrt(dx*dx+dy*dy) < H*0.035*2.5) {
        return { hitPlayer: i, dmg: Math.floor(15+power*0.2+Math.random()*10) };
      }
    }
    if (terrainHit(sx,sy) || sx<-50 || sx>W+50) return { hitPlayer: -1, dmg: 0 };
  }
  return { hitPlayer: -1, dmg: 0 };
}

function showDamage(x,y,val) {
  const el=document.createElement('div');
  el.textContent=typeof val==='number'?`-${val}`:val;
  el.style.cssText=`position:fixed;left:${(x/W)*100}%;top:${(y/H)*70}%;color:${typeof val==='number'?'#f44':'#ffd700'};font-size:1.5rem;font-weight:bold;pointer-events:none;z-index:15;text-shadow:0 0 8px rgba(0,0,0,0.8);animation:floatUp 1s ease-out forwards;`;
  document.body.appendChild(el); setTimeout(()=>el.remove(),1000);
}

// Turns
function nextTurn() {
  randomWind();
  let next = currentPlayer;
  for (let i=0; i<players.length; i++) {
    next = (next+1)%players.length;
    if (players[next].alive) break;
  }
  currentPlayer = next;
  animating=false; fireBtn.disabled=false;
  updateTurnInfo();
  if (cpuMode && cpuPlayers.has(currentPlayer)) {
    clearTimeout(idleTimer);
    setTimeout(cpuFire, 800+Math.random()*600);
  } else if (!onlineMode || myPlayer===currentPlayer) {
    startPowerGauge();
    resetIdleTimer();
  } else {
    resetIdleTimer();
  }
  draw();
}

function updateTurnInfo() {
  const p=players[currentPlayer];
  if (onlineMode) {
    const mine=myPlayer===currentPlayer;
    turnInfo.textContent=mine?'あなたのターン':'相手のターン...';
    turnInfo.style.color=mine?'#2dd4bf':'#f472b6';
    fireBtn.disabled=!mine||animating;
    if(!mine) stopPowerGauge();
  } else if (cpuMode && cpuPlayers.has(currentPlayer)) {
    turnInfo.textContent=`${p.name}(CPU) 思考中...`;
    turnInfo.style.color=p.color;
    fireBtn.disabled=true;
  } else {
    turnInfo.textContent=`${p.name} のターン`;
    turnInfo.style.color=p.color;
  }
}

function showResult(winner) {
  stopPowerGauge();
  document.getElementById('controls').classList.add('hidden');
  turnInfo.classList.add('hidden');
  document.getElementById('windInfo').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  if (onlineMode) {
    const won=winner&&winner===players[myPlayer];
    document.getElementById('winnerText').textContent=won?'🏆 あなたの勝ち!':'😭 負けました...';
    document.getElementById('winnerText').style.color=won?'#2dd4bf':'#f472b6';
  } else if (cpuMode) {
    const won=winner&&!cpuPlayers.has(players.indexOf(winner));
    document.getElementById('winnerText').textContent=won?'🏆 あなたの勝ち!':'🤖 CPUの勝ち!';
    document.getElementById('winnerText').style.color=won?'#2dd4bf':'#f472b6';
  } else {
    document.getElementById('winnerText').textContent=winner?`🏆 ${winner.name} の勝ち!`:'引き分け!';
    document.getElementById('winnerText').style.color=winner?winner.color:'#8ba8a3';
  }
  // Kill scores
  const scoreLines = players.map((p, i) => `${p.name}: ${kills[i]||0}キル`).join(' / ');
  document.getElementById('winnerSub').textContent = scoreLines;

  // Share button
  let shareBtn = document.getElementById('shareBtn');
  if (!shareBtn) {
    shareBtn = document.createElement('button');
    shareBtn.id = 'shareBtn';
    shareBtn.className = 'btn btn-secondary';
    shareBtn.style.marginTop = '1rem';
    shareBtn.textContent = '🔗 シェアして一緒に遊ぶ';
    document.getElementById('retryBtn').after(shareBtn);
    shareBtn.addEventListener('click', shareGame);
  }
  shareBtn.style.display = 'block';

  sfxWin();
}

// Power gauge
const angleSlider=document.getElementById('angleSlider');
const fireBtn=document.getElementById('fireBtn');
const turnInfo=document.getElementById('turnInfo');
const powerBar=document.getElementById('powerBar');
const powerValEl=document.getElementById('powerVal');
let powerValue=10, powerDir=1, powerTimer=null;

function startPowerGauge() {
  powerValue=10; powerDir=1;
  if(powerTimer) clearInterval(powerTimer);
  powerTimer=setInterval(()=>{
    powerValue+=powerDir*2;
    if(powerValue>=100){powerValue=100;powerDir=-1;}
    if(powerValue<=10){powerValue=10;powerDir=1;}
    powerBar.style.width=powerValue+'%'; powerValEl.textContent=powerValue;
    draw();
  },30);
}
function stopPowerGauge(){if(powerTimer){clearInterval(powerTimer);powerTimer=null;}}

// CPU
function cpuFire() {
  if (!gameRunning||!players[currentPlayer].alive) return;
  const angle = 15 + Math.floor(Math.random()*55);
  const power = 20 + Math.floor(Math.random()*70);
  angleSlider.value = angle;
  document.getElementById('angleVal').textContent = angle+'°';
  executeThrow(angle, power, nextTurn);
}

// Local mode
function startLocalGame() {
  const n = parseInt(document.getElementById('playerCount').value);
  onlineMode=false; cpuMode=false; myPlayer=-1; cpuPlayers.clear();
  hideAllOverlays();
  document.getElementById('controls').classList.remove('hidden');
  turnInfo.classList.remove('hidden');
  document.getElementById('windInfo').classList.remove('hidden');
  initGame(n); updateTurnInfo(); startPowerGauge(); resetIdleTimer(); draw();
}

function localFire() {
  if(animating||!gameRunning) return;
  executeThrow(parseInt(angleSlider.value), powerValue, nextTurn);
}

// CPU mode
function showCpuSetup() {
  hideAllOverlays();
  document.getElementById('cpuSetup').classList.remove('hidden');
}

function startCpuGame() {
  const cpuCount = parseInt(document.getElementById('cpuCount').value);
  const total = cpuCount + 1;
  onlineMode=false; cpuMode=true; myPlayer=0; cpuPlayers.clear();
  for (let i=1; i<total; i++) cpuPlayers.add(i);
  hideAllOverlays();
  document.getElementById('controls').classList.remove('hidden');
  turnInfo.classList.remove('hidden');
  document.getElementById('windInfo').classList.remove('hidden');
  initGame(total); updateTurnInfo(); startPowerGauge(); resetIdleTimer(); draw();
}

// Online (2-player)
function generateCode() {
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s='';
  for(let i=0;i<4;i++) s+=c[Math.floor(Math.random()*c.length)]; return s;
}

function createRoom() {
  hideAllOverlays();
  document.getElementById('waitRoom').classList.remove('hidden');
  roomCode=generateCode();
  document.getElementById('roomCodeDisplay').textContent=roomCode;
  const t=TERRAINS[Math.floor(Math.random()*TERRAINS.length)];
  const td={name:t.name,blocks:t.gen()};
  roomRef=db.ref('rooms/'+roomCode);
  roomRef.set({terrain:td,p1:true,p2:false,turn:0,action:null,hp:[100,100],status:'waiting'});
  myPlayer=0;
  roomRef.child('p2').on('value',s=>{if(s.val()===true){document.getElementById('waitRoom').classList.add('hidden');startOnlineGame(td);}});
  roomRef.onDisconnect().remove();
}

function joinRoomUI() {
  hideAllOverlays(); document.getElementById('joinRoom').classList.remove('hidden');
  document.getElementById('roomCodeInput').value=''; document.getElementById('joinError').textContent='';
}

function joinRoom() {
  const code=document.getElementById('roomCodeInput').value.toUpperCase().trim();
  if(code.length!==4){document.getElementById('joinError').textContent='4文字の合言葉を入力';return;}
  const ref=db.ref('rooms/'+code);
  ref.once('value',s=>{
    const d=s.val();
    if(!d){document.getElementById('joinError').textContent='部屋が見つかりません';return;}
    if(d.p2===true){document.getElementById('joinError').textContent='満員です';return;}
    roomCode=code;roomRef=ref;myPlayer=1;
    ref.child('p2').set(true);
    document.getElementById('joinRoom').classList.add('hidden');
    startOnlineGame(d.terrain);
  });
}

function startOnlineGame(td) {
  onlineMode=true; cpuMode=false; cpuPlayers.clear();
  hideAllOverlays();
  document.getElementById('controls').classList.remove('hidden');
  turnInfo.classList.remove('hidden');
  document.getElementById('windInfo').classList.remove('hidden');
  initGame(2,td); updateTurnInfo();
  if(myPlayer===0) startPowerGauge();
  draw(); listenForActions();
}

function listenForActions() {
  roomRef.child('action').on('value',s=>{
    const a=s.val(); if(!a||animating) return;
    if(a.by!==myPlayer&&a.turn===currentPlayer) {
      wind=a.wind||0;
      const result = { hitPlayer: a.hitPlayer, dmg: a.dmg };
      executeThrow(a.angle,a.power,()=>{nextTurn();roomRef.child('action').set(null);}, result);
    }
  });
}

function onlineFire() {
  if(animating||!gameRunning||myPlayer!==currentPlayer) return;
  const angle=parseInt(angleSlider.value),power=powerValue;
  stopPowerGauge();
  const result = simulateThrow(angle, power);
  roomRef.child('action').set({by:myPlayer,turn:currentPlayer,angle,power,wind,hitPlayer:result.hitPlayer,dmg:result.dmg});
  executeThrow(angle,power,()=>{nextTurn();roomRef.child('action').set(null);});
}

function cancelRoom() {
  if(roomRef){roomRef.remove();roomRef=null;} roomCode=null;
  hideAllOverlays(); document.getElementById('ui').classList.remove('hidden');
}

function shareGame() {
  const url = 'https://mochibullet.github.io/spear-battle/';
  const text = '🔱 Spear Battle - 棒人間の槍投げ対戦ゲーム！オンラインで一緒に遊ぼう！';
  if (navigator.share) {
    navigator.share({ title: 'Spear Battle', text, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(`${text}\n${url}`).then(() => {
      alert('リンクをコピーしました！');
    });
  }
}

function hideAllOverlays() {
  ['ui','cpuSetup','waitRoom','joinRoom','result','controls'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  turnInfo.classList.add('hidden'); document.getElementById('windInfo').classList.add('hidden');
}

// Events
angleSlider.addEventListener('input',()=>{document.getElementById('angleVal').textContent=angleSlider.value+'°';draw();});
fireBtn.addEventListener('click',()=>{if(onlineMode)onlineFire();else localFire();});
document.getElementById('startBtn').addEventListener('click',startLocalGame);
document.getElementById('cpuBtn').addEventListener('click',showCpuSetup);
document.getElementById('cpuStartBtn').addEventListener('click',startCpuGame);
document.getElementById('cpuBackBtn').addEventListener('click',()=>{hideAllOverlays();document.getElementById('ui').classList.remove('hidden');});
document.getElementById('createRoomBtn').addEventListener('click',createRoom);
document.getElementById('joinRoomBtn').addEventListener('click',joinRoomUI);
document.getElementById('joinConfirmBtn').addEventListener('click',joinRoom);
document.getElementById('roomCodeInput').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom();});
document.getElementById('cancelRoomBtn').addEventListener('click',cancelRoom);
document.getElementById('cancelJoinBtn').addEventListener('click',()=>{hideAllOverlays();document.getElementById('ui').classList.remove('hidden');});
document.getElementById('retryBtn').addEventListener('click',()=>{if(roomRef){roomRef.remove();roomRef=null;}hideAllOverlays();document.getElementById('ui').classList.remove('hidden');});

initGame(2); draw();
</script>
</body>
</html>
